- name: vllm-chunked-prefill-pp2
  status: failed
  priority: 1
  framework: vllm
  model: Qwen/Qwen3-Coder-Next-FP8
  node_config: pp2-spark01-spark02
  description: Enable chunked prefill to reduce TTFT at high concurrency
  variable_changed: add --enable-chunked-prefill to vllm serve args
  hypothesis: Chunked prefill distributes prefill across decode steps, reducing TTFT
    p99 at c=32. sara4dev saw +50% throughput on SM120; expect similar on SM121.
  expected_delta: -20% TTFT p99, throughput neutral or slight regression
  image: ghcr.io/elizabetht/inference-images/vllm-serve:0.0.1
  date_run: '2026-04-06'

- name: vllm-higher-mem-utilization-pp2
  status: failed
  priority: 2
  framework: vllm
  model: Qwen/Qwen3-Coder-Next-FP8
  node_config: pp2-spark01-spark02
  description: Increase gpu-memory-utilization from 0.75 to 0.85
  variable_changed: --gpu-memory-utilization 0.85
  hypothesis: More KV cache blocks available → better batching → higher throughput.
    sara4dev saw regression (3553→3568 only) at 0.90 — 0.85 is a safer step first.
  expected_delta: +10-15% throughput if Ray overhead allows
  image: ghcr.io/elizabetht/inference-images/vllm-serve:0.0.1
