# Experiment queue — inference-research/autoresearch
#
# Active ablation study: Progressive inference optimization on Gemma 4 26B A4B
#   Framework: llm-d (disaggregated prefill/decode)
#   Hardware:  2x DGX Spark GB10 (SM121, arm64, 128GB unified memory)
#   Topology:  spark-01 = prefill node, spark-02 = decode node
#   Model:     google/gemma-4-26b-it (A4B sparse activations)
#
# Each experiment inherits the previous best config and adds ONE technique.
# Baseline config derived from serve_config.py defaults.
#
# Archived entries below the active experiments preserve prior Qwen3 work.

experiments:

  # ── ACTIVE ABLATION: Gemma 4 26B A4B / llm-d disaggregated PD ─────────────

  - name: gemma4-llmd-baseline
    status: pending
    priority: 1
    depends_on: null
    framework: llm-d
    model: google/gemma-4-26b-it
    node_config:
      prefill: spark-01   # 192.168.1.76
      decode:  spark-02   # 192.168.1.77
    config:
      enforce_eager: true
      dtype: bfloat16
      quantization: null
      kv_cache_dtype: auto
      gpu_memory_utilization: 0.75
      enable_prefix_caching: false
      enable_chunked_prefill: false
      speculative_decoding: null
      cuda_graphs: false
    hypothesis: >
      Pure baseline with no optimizations. Establishes throughput and TTFT/ITL
      floor on GB10 with llm-d disaggregated PD. enforce_eager=True avoids CUDA
      graph capture risk during initial validation. bf16 weights match model
      native precision. 0.75 mem util is conservative for Ray+llm-d overhead on
      128GB unified memory (consistent with serve_config.py baseline).
    expected_metrics:
      throughput_tok_s: null
      ttft_p50_ms: null
      ttft_p99_ms: null
      itl_p50_ms: null
      itl_p99_ms: null
    notes: >
      First run on llm-d — validate disaggregated PD routing is healthy before
      layering any optimizations. Confirm spark-01 handles prefill only and
      spark-02 handles decode only via llm-d scheduler.

  - name: gemma4-llmd-prefix-cache
    status: pending
    priority: 2
    depends_on: gemma4-llmd-baseline
    framework: llm-d
    model: google/gemma-4-26b-it
    node_config:
      prefill: spark-01
      decode:  spark-02
    config:
      enforce_eager: true
      dtype: bfloat16
      quantization: null
      kv_cache_dtype: auto
      gpu_memory_utilization: 0.75
      enable_prefix_caching: true   # NEW
      enable_chunked_prefill: false
      speculative_decoding: null
      cuda_graphs: false
    hypothesis: >
      Prefix caching (APC) allows the prefill node to reuse KV cache blocks for
      shared prompt prefixes across requests. In disaggregated PD, cache hits
      avoid re-running prefill entirely — the KV blocks are already resident on
      spark-01 and can be transferred directly to spark-02. Expected to reduce
      TTFT p50 by 20-40% for workloads with repeated system prompts or few-shot
      examples. Throughput neutral or slightly positive due to reduced prefill
      compute. Per serve_config.py, APC is default-on for code workloads.
    expected_metrics:
      ttft_p50_delta: -20% to -40% (for cache-warm requests)
      throughput_delta: neutral to +5%
    notes: >
      Measure both cold-cache (first request) and warm-cache (repeated prefix)
      TTFT to quantify actual hit rate. APC overhead on cache miss is minimal
      per prior Qwen3 experiments (~0% throughput penalty).

  - name: gemma4-llmd-chunked-prefill
    status: pending
    priority: 3
    depends_on: gemma4-llmd-baseline
    framework: llm-d
    model: google/gemma-4-26b-it
    node_config:
      prefill: spark-01
      decode:  spark-02
    config:
      enforce_eager: true
      dtype: bfloat16
      quantization: null
      kv_cache_dtype: auto
      gpu_memory_utilization: 0.75
      enable_prefix_caching: false
      enable_chunked_prefill: true   # NEW — independent axis from prefix cache
      chunked_prefill_size: 512      # tokens per chunk; tune per GB10 SM occupancy
      speculative_decoding: null
      cuda_graphs: false
    hypothesis: >
      Chunked prefill splits long prompts into fixed-size chunks processed across
      multiple decode steps, interleaving prefill and decode work. On the prefill
      node (spark-01), this reduces head-of-line blocking for concurrent requests:
      a large 32K prompt no longer monopolizes the prefill GPU for an entire
      forward pass. Expected to reduce TTFT p99 at high concurrency (c=32+) by
      smoothing prefill latency spikes. Throughput may be neutral or slightly
      positive. This is measured independently from prefix cache to isolate effect.
    expected_metrics:
      ttft_p99_delta: -20% to -30% at c=32
      throughput_delta: neutral
    notes: >
      This experiment is on an independent optimization axis from prefix-cache.
      Both will be combined in gemma4-llmd-full-stack. Tune chunked_prefill_size
      for GB10 — SM121 has 20 SM per GPU; 512 tokens/chunk is a starting point.

  - name: gemma4-llmd-fp8-quant
    status: pending
    priority: 4
    depends_on: gemma4-llmd-prefix-cache
    framework: llm-d
    model: google/gemma-4-26b-it   # try google/gemma-4-26B-A4B-FP8 if available
    node_config:
      prefill: spark-01
      decode:  spark-02
    config:
      enforce_eager: true
      dtype: bfloat16
      quantization: fp8             # NEW — FP8 weight quantization
      kv_cache_dtype: fp8           # also quantize KV cache
      gpu_memory_utilization: 0.75
      enable_prefix_caching: true   # inherited from gemma4-llmd-prefix-cache
      enable_chunked_prefill: false
      speculative_decoding: null
      cuda_graphs: false
    hypothesis: >
      FP8 weight quantization halves weight memory footprint (vs bf16), freeing
      ~13GB per node on GB10. This expands the KV cache budget significantly,
      enabling larger batch sizes and higher throughput. GB10 SM121 has native
      FP8 tensor core support (Blackwell architecture) so no emulation penalty.
      If google/gemma-4-26B-A4B-FP8 is available on HuggingFace, use it for
      pre-calibrated quantization; otherwise apply in-flight FP8 quantization
      via --quantization fp8. Combined FP8 KV cache further reduces memory
      pressure. Expected +30-50% throughput from larger effective batch capacity.
    expected_metrics:
      throughput_delta: +30% to +50%
      ttft_p50_delta: neutral (prefix cache still active)
      itl_p50_delta: -10% to -20% (from larger batches)
    notes: >
      Check HuggingFace for google/gemma-4-26B-A4B-FP8 before falling back to
      in-flight quantization. In-flight FP8 requires calibration data — use a
      representative sample of the benchmark prompts. Validate output quality
      (ROUGE or perplexity) against bf16 baseline to catch quantization regressions.

  - name: gemma4-llmd-spec-decoding
    status: pending
    priority: 5
    depends_on: gemma4-llmd-fp8-quant
    framework: llm-d
    model: google/gemma-4-26b-it
    node_config:
      prefill: spark-01
      decode:  spark-02
    config:
      enforce_eager: true
      dtype: bfloat16
      quantization: fp8             # inherited
      kv_cache_dtype: fp8           # inherited
      gpu_memory_utilization: 0.75
      enable_prefix_caching: true   # inherited
      enable_chunked_prefill: false
      speculative_decoding:         # NEW
        method: ngram               # fallback if no Gemma 4 draft model exists
        draft_model: TBD            # see notes — check for gemma-4-2b or similar
        num_speculative_tokens: 5
      cuda_graphs: false
    hypothesis: >
      Speculative decoding uses a small draft model to propose N tokens in one
      forward pass; the target model verifies all N in parallel. Net effect:
      fewer serial decode steps per response, reducing ITL and total generation
      latency. In disaggregated PD, the draft model runs on spark-02 (decode
      node) alongside the target decode. A Gemma 4 draft model from the same
      family should have high token acceptance rate (>70%) due to shared
      vocabulary and architecture priors. If no Gemma 4 draft exists, ngram
      speculative decoding provides a baseline acceleration with zero additional
      model weight memory.
    expected_metrics:
      itl_p50_delta: -30% to -50% (with high acceptance rate)
      throughput_delta: +10% to +20%
    notes: >
      DRAFT MODEL SELECTION — check in priority order:
        1. google/gemma-4-2b-it or google/gemma-4-4b-it (same family, smallest)
        2. Any official Gemma 4 draft / distilled checkpoint on HuggingFace
        3. ngram speculative decoding (--speculative-config method=ngram) as fallback
      For disaggregated PD: confirm llm-d supports co-locating draft model on
      decode node. If not supported natively, run draft on spark-02 as a sidecar.
      num_speculative_tokens=5 is a starting point; tune for acceptance rate vs
      verification overhead tradeoff on GB10.

  - name: gemma4-llmd-fp8-plus-spec
    status: pending
    priority: 6
    depends_on: gemma4-llmd-spec-decoding
    framework: llm-d
    model: google/gemma-4-26b-it
    node_config:
      prefill: spark-01
      decode:  spark-02
    config:
      enforce_eager: true
      dtype: bfloat16
      quantization: fp8
      kv_cache_dtype: fp8
      gpu_memory_utilization: 0.75
      enable_prefix_caching: true
      enable_chunked_prefill: false
      speculative_decoding:
        method: ngram               # or draft model from gemma4-llmd-spec-decoding
        num_speculative_tokens: 5
      cuda_graphs: false
    hypothesis: >
      Validates that FP8 quantization and speculative decoding compose without
      interference. FP8 reduces memory footprint (enabling larger batches);
      spec decoding reduces per-token latency. The combination should show
      additive gains: throughput up from FP8's batch capacity, ITL down from
      spec decoding's token proposal acceleration. Potential concern: FP8 weights
      may slightly reduce draft acceptance rate if the quantization shifts the
      target model's token distribution. This experiment isolates that interaction.
    expected_metrics:
      throughput_delta: +35% to +55% vs baseline (FP8 gain preserved)
      itl_p50_delta: -25% to -45% vs baseline (spec decoding gain preserved)
    notes: >
      If acceptance rate degrades vs gemma4-llmd-spec-decoding (bf16 target),
      consider tuning speculative_acceptance_threshold or reducing
      num_speculative_tokens to 3. Compare acceptance rates between this
      experiment and gemma4-llmd-spec-decoding to quantify FP8 interaction.

  - name: gemma4-llmd-cuda-graphs
    status: pending
    priority: 7
    depends_on: gemma4-llmd-fp8-plus-spec
    framework: llm-d
    model: google/gemma-4-26b-it
    node_config:
      prefill: spark-01
      decode:  spark-02
    config:
      enforce_eager: false          # NEW — enable CUDA graph capture
      dtype: bfloat16
      quantization: fp8
      kv_cache_dtype: fp8
      gpu_memory_utilization: 0.75
      enable_prefix_caching: true
      enable_chunked_prefill: false
      speculative_decoding:
        method: ngram
        num_speculative_tokens: 5
      cuda_graphs: true
    hypothesis: >
      CUDA graph capture replays the decode forward pass as a pre-compiled GPU
      kernel graph, eliminating Python/CUDA driver overhead on each decode step.
      On SM121 Blackwell, prior Qwen3 experiments showed +15-20% throughput from
      removing enforce_eager. In disaggregated PD, CUDA graphs are most impactful
      on the decode node (spark-02) where the tight decode loop runs repeatedly.
      The prefill node may see smaller benefit due to variable-length prefill
      batches. Combined with FP8+spec decoding from previous experiments, expect
      cumulative gain to push throughput significantly above baseline.
    expected_metrics:
      throughput_delta: +15% to +20% vs gemma4-llmd-fp8-plus-spec
    notes: >
      RISK: CUDA graph capture may hang or OOM on GB10 unified memory — monitor
      closely during first capture phase. Per serve_config.py Blackwell workarounds:
      NCCL_P2P_DISABLE=1 and NCCL_IB_DISABLE=1 must be set. If capture fails,
      fall back to enforce_eager=True and skip this optimization in full-stack.
      Do NOT set DISABLE_CUSTOM_ALL_REDUCE for PP=2 (single GPU per node, no TP).
      VLLM_USE_RAY_COMPILED_DAG=0 must remain set — compiled DAG hangs on GB10.

  - name: gemma4-llmd-full-stack
    status: pending
    priority: 8
    depends_on: gemma4-llmd-cuda-graphs
    framework: llm-d
    model: google/gemma-4-26b-it
    node_config:
      prefill: spark-01
      decode:  spark-02
    config:
      enforce_eager: false          # CUDA graphs enabled
      dtype: bfloat16
      quantization: fp8             # FP8 weights
      kv_cache_dtype: fp8           # FP8 KV cache
      gpu_memory_utilization: 0.80  # slightly higher now that FP8 reduces weight footprint
      enable_prefix_caching: true   # prefix cache
      enable_chunked_prefill: true  # chunked prefill
      chunked_prefill_size: 512
      speculative_decoding:
        method: ngram               # or Gemma 4 draft model if validated
        num_speculative_tokens: 5
      cuda_graphs: true
    hypothesis: >
      All validated optimizations combined: prefix cache (TTFT reduction) +
      chunked prefill (TTFT p99 smoothing) + FP8 quant (throughput from memory
      savings) + speculative decoding (ITL reduction) + CUDA graphs (kernel
      overhead removal). If all techniques compose without interference, expect
      multiplicative gains across throughput AND latency simultaneously.
      gpu_memory_utilization bumped to 0.80 since FP8 weights reduce peak memory
      pressure, providing more KV cache headroom. This is the production-candidate
      configuration if metrics confirm no regressions.
    expected_metrics:
      throughput_delta: +50% to +80% vs baseline
      ttft_p50_delta: -25% to -40% vs baseline
      itl_p50_delta: -30% to -50% vs baseline
    notes: >
      Run this experiment last — it validates the full composition. If any metric
      regresses vs gemma4-llmd-cuda-graphs, bisect by disabling optimizations one
      at a time. Pay special attention to chunked prefill + speculative decoding
      interaction: chunked prefill changes prefill scheduling which may affect
      when spec tokens are proposed relative to decode batches.

